<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Manager Pro — Premium Dashboard</title>
<meta name="description" content="A premium glassmorphism task manager built with vanilla JavaScript." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/layout.css" />
<link rel="stylesheet" href="css/dark.css" />
<link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <!-- Animated background blobs -->
  <div class="bg-scene" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-pattern"></div>
  </div>

  <div class="scroll-progress" id="scrollProgress"></div>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar glass">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M5 12l4 4L19 6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div>
          <h1>TaskFlow</h1>
          <span>Pro Dashboard</span>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-filter="all">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><rect x="3" y="4" width="18" height="4" rx="1" stroke="currentColor" stroke-width="2"/><rect x="3" y="10" width="18" height="4" rx="1" stroke="currentColor" stroke-width="2"/><rect x="3" y="16" width="18" height="4" rx="1" stroke="currentColor" stroke-width="2"/></svg>
          <span>All Tasks</span><em id="count-all">0</em>
        </button>
        <button class="nav-item" data-filter="active">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>Active</span><em id="count-active">0</em>
        </button>
        <button class="nav-item" data-filter="completed">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/></svg>
          <span>Completed</span><em id="count-done">0</em>
        </button>
        <button class="nav-item" data-filter="high">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          <span>High Priority</span><em id="count-high">0</em>
        </button>
      </nav>

      <div class="side-card">
        <div class="ring-wrap">
          <svg class="ring" width="90" height="90" viewBox="0 0 90 90">
            <circle cx="45" cy="45" r="38" stroke="rgba(255,255,255,.15)" stroke-width="8" fill="none"/>
            <circle id="progRing" cx="45" cy="45" r="38" stroke="url(#grad1)" stroke-width="8" fill="none"
              stroke-dasharray="238.76" stroke-dashoffset="238.76" stroke-linecap="round" transform="rotate(-90 45 45)"/>
            <defs><linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#a855f7"/><stop offset="50%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#ec4899"/>
            </linearGradient></defs>
          </svg>
          <div class="ring-label"><b id="progPct">0%</b><span>Done</span></div>
        </div>
        <p>Keep going! Small steps make big progress.</p>
      </div>

      <div class="side-footer">
        <button id="themeToggle" class="icon-btn" title="Toggle theme">
          <svg class="ic-sun" viewBox="0 0 24 24" fill="none" width="18" height="18"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <svg class="ic-moon" viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        </button>
        <button id="exportBtn" class="icon-btn" title="Export JSON">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <label class="icon-btn" title="Import JSON">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M12 21V9m0 0l-4 4m4-4l4 4M4 3h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input id="importInput" type="file" accept="application/json" hidden />
        </label>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div>
          <h2 class="greeting" id="greeting">Good morning ✨</h2>
          <p class="sub">Here's what's on your plate today.</p>
        </div>
        <div class="search glass">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <input id="searchInput" type="text" placeholder="Search tasks…" />
        </div>
      </header>

      <!-- Stats -->
      <section class="stats">
        <div class="stat glass grad-a">
          <div class="stat-ic">
            <svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M4 6h16M4 12h16M4 18h10" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
          </div>
          <div><span class="stat-label">Total Tasks</span><b class="stat-val" data-count id="stTotal">0</b></div>
        </div>
        <div class="stat glass grad-b">
          <div class="stat-ic">
            <svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M12 6v6l4 2" stroke="white" stroke-width="2.5" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="white" stroke-width="2.5"/></svg>
          </div>
          <div><span class="stat-label">In Progress</span><b class="stat-val" data-count id="stActive">0</b></div>
        </div>
        <div class="stat glass grad-c">
          <div class="stat-ic">
            <svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M5 12l4 4L19 6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div><span class="stat-label">Completed</span><b class="stat-val" data-count id="stDone">0</b></div>
        </div>
        <div class="stat glass grad-d">
          <div class="stat-ic">
            <svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z" stroke="white" stroke-width="2.5" stroke-linejoin="round"/></svg>
          </div>
          <div><span class="stat-label">High Priority</span><b class="stat-val" data-count id="stHigh">0</b></div>
        </div>
      </section>

      <!-- New task -->
      <section class="composer glass">
        <form id="taskForm" class="composer-form">
          <div class="composer-main">
            <span class="composer-dot"></span>
            <input id="titleInput" type="text" placeholder="What needs to get done?" maxlength="120" required />
          </div>
          <div class="composer-meta">
            <select id="prioritySelect" title="Priority">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
            <select id="categorySelect" title="Category">
              <option value="work">💼 Work</option>
              <option value="personal">🌿 Personal</option>
              <option value="study">📚 Study</option>
              <option value="health">💪 Health</option>
              <option value="other">✨ Other</option>
            </select>
            <input id="dueInput" type="date" />
            <button type="submit" class="btn-primary">
              <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M12 5v14M5 12h14" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
              Add Task
            </button>
          </div>
        </form>
      </section>

      <!-- Task List -->
      <section class="list-panel glass">
        <div class="list-head">
          <h3 id="listTitle">All Tasks</h3>
          <div class="chip-row" id="filterChips">
            <button class="chip active" data-filter="all">All</button>
            <button class="chip" data-filter="active">Active</button>
            <button class="chip" data-filter="completed">Completed</button>
            <button class="chip" data-filter="high">High</button>
          </div>
        </div>
        <ul id="taskList" class="task-list"></ul>
        <div id="emptyState" class="empty">
          <svg viewBox="0 0 200 160" width="180" height="140" fill="none" aria-hidden="true">
            <defs><linearGradient id="eg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#ec4899"/></linearGradient></defs>
            <ellipse cx="100" cy="140" rx="70" ry="8" fill="rgba(139,92,246,.15)"/>
            <rect x="45" y="35" width="110" height="90" rx="16" fill="url(#eg)" opacity=".18"/>
            <rect x="45" y="35" width="110" height="90" rx="16" stroke="url(#eg)" stroke-width="2"/>
            <path d="M65 65h70M65 82h55M65 99h40" stroke="url(#eg)" stroke-width="3" stroke-linecap="round"/>
            <circle cx="150" cy="45" r="14" fill="url(#eg)"/>
            <path d="M144 45l4 4 8-8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <h4>No tasks yet</h4>
          <p>Add your first task above and start crushing your day.</p>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
